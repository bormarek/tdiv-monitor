<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>TDIV – Monitor rynkowy</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.3/dist/chart.umd.min.js"></script>
  <style>
    :root {
      --bg: #f0f4f8;
      --surface: #ffffff;
      --surface2: #e8eef5;
      --border: #d1dce8;
      --text: #2d3748;
      --muted: #7a8fa6;
      --green: #2e9e5b;
      --green-bg: #d6f0e2;
      --red: #c0392b;
      --red-bg: #fde8e6;
      --blue: #4a7fc1;
      --blue-bg: #ddeaf8;
      --yellow: #b7791f;
    }
    * { box-sizing: border-box; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Segoe UI', system-ui, sans-serif;
      font-size: 0.875rem;
      margin: 0;
    }
    header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 1rem 1.5rem;
      display: flex;
      align-items: center;
      gap: 1rem;
      flex-wrap: wrap;
      box-shadow: 0 1px 4px rgba(74,127,193,0.08);
    }
    header h1 {
      font-size: 1.1rem;
      font-weight: 700;
      margin: 0;
      letter-spacing: 0.01em;
      color: #1a2e45;
    }
    header .subtitle {
      color: var(--muted);
      font-size: 0.8rem;
    }
    .header-right {
      margin-left: auto;
      display: flex;
      align-items: center;
      gap: 0.75rem;
      flex-wrap: wrap;
    }
    .badge-stat {
      display: inline-flex;
      align-items: center;
      gap: 0.3rem;
      padding: 0.3rem 0.75rem;
      border-radius: 999px;
      font-size: 0.78rem;
      font-weight: 600;
    }
    .badge-up { background: var(--green-bg); color: var(--green); }
    .badge-down { background: var(--red-bg); color: var(--red); }
    .badge-unk { background: #e8eef5; color: var(--muted); }
    .update-time { color: var(--muted); font-size: 0.75rem; }

    .toolbar {
      padding: 0.75rem 1.5rem;
      display: flex;
      gap: 0.75rem;
      align-items: center;
      flex-wrap: wrap;
      background: var(--surface);
      border-bottom: 1px solid var(--border);
    }
    .toolbar input[type=search] {
      background: var(--bg);
      border: 1px solid var(--border);
      color: var(--text);
      border-radius: 8px;
      padding: 0.4rem 0.75rem;
      width: 220px;
      font-size: 0.85rem;
    }
    .toolbar input[type=search]::placeholder { color: var(--muted); }
    .toolbar input[type=search]:focus { outline: none; border-color: var(--blue); background: #fff; }

    .filter-btn {
      background: var(--bg);
      border: 1px solid var(--border);
      color: var(--muted);
      border-radius: 8px;
      padding: 0.4rem 0.8rem;
      font-size: 0.8rem;
      cursor: pointer;
      transition: all 0.15s;
      font-weight: 500;
    }
    .filter-btn:hover { background: var(--blue-bg); border-color: var(--blue); color: var(--blue); }
    .filter-btn.active { background: var(--blue-bg); border-color: var(--blue); color: var(--blue); font-weight: 600; }
    .filter-btn.active-up { background: var(--green-bg); border-color: var(--green); color: var(--green); font-weight: 600; }
    .filter-btn.active-down { background: var(--red-bg); border-color: var(--red); color: var(--red); font-weight: 600; }

    .refresh-btn {
      background: var(--blue);
      border: none;
      color: #fff;
      border-radius: 8px;
      padding: 0.4rem 1rem;
      font-size: 0.82rem;
      font-weight: 600;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 0.4rem;
      transition: opacity 0.15s;
      box-shadow: 0 1px 3px rgba(74,127,193,0.25);
    }
    .refresh-btn:hover { opacity: 0.88; }
    .refresh-btn:disabled { opacity: 0.5; cursor: not-allowed; }

    .table-wrap {
      overflow-x: auto;
      padding: 1rem 1.5rem 2rem;
    }
    table {
      width: 100%;
      border-collapse: separate;
      border-spacing: 0;
      background: var(--surface);
      border-radius: 12px;
      border: 1px solid var(--border);
      overflow: hidden;
      box-shadow: 0 1px 6px rgba(74,127,193,0.07);
    }
    thead th {
      background: #edf2f8;
      color: var(--muted);
      font-weight: 700;
      font-size: 0.72rem;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      padding: 0.7rem 0.85rem;
      border-bottom: 1px solid var(--border);
      white-space: nowrap;
      cursor: pointer;
      user-select: none;
    }
    thead th:hover { color: var(--blue); }
    thead th .sort-icon { opacity: 0.4; margin-left: 4px; }
    thead th.sort-asc .sort-icon::after { content: ' ↑'; opacity: 1; color: var(--blue); }
    thead th.sort-desc .sort-icon::after { content: ' ↓'; opacity: 1; color: var(--blue); }
    tbody tr {
      border-bottom: 1px solid var(--border);
      transition: background 0.1s;
    }
    tbody tr:last-child { border-bottom: none; }
    tbody tr:hover { background: #f5f8fc; }
    td {
      padding: 0.6rem 0.85rem;
      white-space: nowrap;
    }
    .td-name { white-space: normal; min-width: 180px; font-weight: 500; color: #1a2e45; }
    .td-ticker { color: var(--muted); font-family: monospace; font-size: 0.8rem; }
    .td-price { font-variant-numeric: tabular-nums; font-weight: 700; color: #1a2e45; }
    .td-change { font-variant-numeric: tabular-nums; }
    .up { color: var(--green); }
    .down { color: var(--red); }
    .unknown { color: var(--muted); }
    .trend-badge {
      display: inline-flex;
      align-items: center;
      gap: 0.25rem;
      padding: 0.2rem 0.6rem;
      border-radius: 6px;
      font-size: 0.76rem;
      font-weight: 700;
    }
    .trend-up { background: var(--green-bg); color: var(--green); }
    .trend-down { background: var(--red-bg); color: var(--red); }
    .trend-unknown { background: #e8eef5; color: var(--muted); }
    .weight { color: var(--muted); font-size: 0.8rem; }

    /* Loading overlay */
    #overlay {
      position: fixed; inset: 0;
      background: rgba(240,244,248,0.88);
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      gap: 1rem;
      z-index: 999;
      backdrop-filter: blur(2px);
    }
    #overlay.hidden { display: none; }
    .spinner {
      width: 42px; height: 42px;
      border: 3px solid var(--border);
      border-top-color: var(--blue);
      border-radius: 50%;
      animation: spin 0.75s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .loading-text { color: var(--muted); font-size: 0.9rem; font-weight: 500; }

    #error-bar {
      background: var(--red-bg);
      border-bottom: 1px solid #f5c6c2;
      color: var(--red);
      padding: 0.6rem 1.5rem;
      font-size: 0.85rem;
      display: none;
    }

    .empty-row td { text-align: center; color: var(--muted); padding: 2rem; }

    /* CSS tooltip */
    [data-tip] { position: relative; cursor: help; }
    [data-tip]::after {
      content: attr(data-tip);
      position: absolute;
      top: calc(100% + 8px);
      left: 50%;
      transform: translateX(-50%);
      background: #1a2e45;
      color: #e2e8f0;
      padding: 0.5rem 0.75rem;
      border-radius: 8px;
      font-size: 0.75rem;
      font-weight: 400;
      width: 260px;
      white-space: normal;
      line-height: 1.5;
      text-transform: none;
      letter-spacing: 0;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.18s;
      z-index: 500;
      box-shadow: 0 4px 16px rgba(26,46,69,0.18);
    }
    [data-tip]:hover::after { opacity: 1; }

    /* Wiersze tabeli klikalne */
    tbody tr { cursor: pointer; }

    /* Modal wykresu */
    #chart-modal {
      position: fixed; inset: 0;
      background: rgba(45,55,72,0.45);
      display: flex; align-items: center; justify-content: center;
      z-index: 1000;
      padding: 1rem;
      backdrop-filter: blur(3px);
    }
    #chart-modal.hidden { display: none; }
    .chart-card {
      background: var(--surface);
      border-radius: 16px;
      box-shadow: 0 8px 40px rgba(45,55,72,0.18);
      width: 100%;
      max-width: 820px;
      padding: 1.5rem;
      position: relative;
    }
    .chart-header {
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      margin-bottom: 1rem;
      gap: 1rem;
    }
    .chart-title { font-size: 1rem; font-weight: 700; color: #1a2e45; margin: 0; }
    .chart-subtitle { color: var(--muted); font-size: 0.8rem; margin-top: 0.1rem; }
    .chart-price-block { text-align: right; }
    .chart-price { font-size: 1.4rem; font-weight: 800; color: #1a2e45; }
    .chart-change { font-size: 0.82rem; font-weight: 600; margin-top: 0.1rem; }
    .chart-close-btn {
      position: absolute; top: 1rem; right: 1rem;
      background: var(--bg); border: 1px solid var(--border);
      border-radius: 50%; width: 30px; height: 30px;
      cursor: pointer; font-size: 1rem; color: var(--muted);
      display: flex; align-items: center; justify-content: center;
      transition: all 0.15s;
    }
    .chart-close-btn:hover { background: var(--red-bg); border-color: var(--red); color: var(--red); }
    .period-btns {
      display: flex; gap: 0.4rem; margin-bottom: 1rem;
    }
    .period-btn {
      background: var(--bg); border: 1px solid var(--border);
      border-radius: 6px; padding: 0.25rem 0.65rem;
      font-size: 0.78rem; font-weight: 600; cursor: pointer;
      color: var(--muted); transition: all 0.15s;
    }
    .period-btn:hover { border-color: var(--blue); color: var(--blue); }
    .period-btn.active { background: var(--blue-bg); border-color: var(--blue); color: var(--blue); }
    .chart-legend {
      display: flex; gap: 1rem; margin-bottom: 0.75rem; font-size: 0.76rem;
    }
    .legend-item { display: flex; align-items: center; gap: 0.35rem; color: var(--muted); font-weight: 600; }
    .legend-dot { width: 10px; height: 3px; border-radius: 2px; }
    #chart-loading {
      text-align: center; padding: 3rem; color: var(--muted);
    }
    #chart-error {
      text-align: center; padding: 3rem; color: var(--red);
      display: none;
    }
    .chart-canvas-wrap { position: relative; height: 320px; }
  </style>
</head>
<body>

<!-- Modal wykresu -->
<div id="chart-modal" class="hidden" onclick="closeChartOnBackdrop(event)">
  <div class="chart-card">
    <button class="chart-close-btn" onclick="closeChart()">&#x2715;</button>
    <div class="chart-header">
      <div>
        <div class="chart-title" id="chart-name"></div>
        <div class="chart-subtitle" id="chart-ticker-label"></div>
      </div>
      <div class="chart-price-block">
        <div class="chart-price" id="chart-price"></div>
        <div class="chart-change" id="chart-change"></div>
      </div>
    </div>
    <div class="period-btns">
      <button class="period-btn" onclick="setPeriod(30)">1M</button>
      <button class="period-btn active" onclick="setPeriod(90)">3M</button>
      <button class="period-btn" onclick="setPeriod(180)">6M</button>
    </div>
    <div class="chart-legend">
      <div class="legend-item"><div class="legend-dot" style="background:#4a7fc1;height:2px;width:14px;"></div>Cena</div>
      <div class="legend-item"><div class="legend-dot" style="background:#e07b39;height:2px;width:14px;"></div>MA5</div>
      <div class="legend-item"><div class="legend-dot" style="background:#9b59b6;height:2px;width:14px;"></div>MA20</div>
    </div>
    <div id="chart-loading">Wczytywanie danych&hellip;</div>
    <div id="chart-error"></div>
    <div class="chart-canvas-wrap" id="chart-canvas-wrap" style="display:none">
      <canvas id="price-chart"></canvas>
    </div>
  </div>
</div>

<div id="overlay">
  <div class="spinner"></div>
  <div class="loading-text">Pobieranie danych rynkowych&hellip;</div>
</div>

<header>
  <div>
    <h1>TDIV &mdash; Monitor rynkowy</h1>
    <div class="subtitle">VanEck Morningstar Developed Markets Dividend Leaders ETF</div>
  </div>
  <div class="header-right">
    <span class="badge-stat badge-up" id="stat-up">&#x25B2; &ndash;</span>
    <span class="badge-stat badge-down" id="stat-down">&#x25BC; &ndash;</span>
    <span class="badge-stat badge-unk" id="stat-unk">&#x3F; &ndash;</span>
    <span class="update-time" id="update-time"></span>
    <span id="source-badge"></span>
  </div>
</header>

<div id="error-bar" role="alert"></div>

<div class="toolbar">
  <input type="search" id="search" placeholder="Szukaj spółki lub tickera&hellip;" />
  <button class="filter-btn" id="filter-all" onclick="setFilter('all')">Wszystkie</button>
  <button class="filter-btn" id="filter-up" onclick="setFilter('up')">&#x25B2; Wzrost</button>
  <button class="filter-btn" id="filter-down" onclick="setFilter('down')">&#x25BC; Spadek</button>
  <button class="filter-btn" id="filter-ma5up" onclick="setFilter('ma5up')">MA5 &#x25B2;</button>
  <button class="filter-btn" id="filter-ma5down" onclick="setFilter('ma5down')">MA5 &#x25BC;</button>
  <button class="refresh-btn" id="refresh-btn" onclick="forceRefresh()">
    <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
      <path d="M23 4v6h-6"/><path d="M1 20v-6h6"/>
      <path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/>
    </svg>
    Odśwież
  </button>
  <span style="color:var(--muted);font-size:0.75rem;" id="count-info"></span>
</div>

<div class="table-wrap">
  <table id="data-table">
    <thead>
      <tr>
        <th onclick="sortBy('number')">#<span class="sort-icon"></span></th>
        <th onclick="sortBy('name')" class="td-name">Spółka<span class="sort-icon"></span></th>
        <th onclick="sortBy('ticker')">Ticker<span class="sort-icon"></span></th>
        <th onclick="sortBy('price')">Cena<span class="sort-icon"></span></th>
        <th onclick="sortBy('daily_change_pct')">Zmiana dnia<span class="sort-icon"></span></th>
        <th onclick="sortBy('daily_trend')">Sesja<span class="sort-icon"></span></th>
        <th onclick="sortBy('ma5')" data-tip="5-dniowa średnia krocząca — średnia cen zamknięcia z ostatnich 5 sesji giełdowych. Wygładza krótkoterminowe wahania kursu.">MA5 &#x24D8;<span class="sort-icon"></span></th>
        <th onclick="sortBy('ma5_trend')" data-tip="Kierunek MA5: jeśli dzisiejsza 5-dniowa średnia jest wyższa niż wczorajsza → Rosnący. Jeśli niższa → Spadkowy. Pokazuje krótkoterminowy trend.">Trend 5D &#x24D8;<span class="sort-icon"></span></th>
        <th onclick="sortBy('weight')">Udział<span class="sort-icon"></span></th>
      </tr>
    </thead>
    <tbody id="table-body">
    </tbody>
  </table>
</div>

<script>
  let allData = [];
  let currentFilter = 'all';
  let currentSort = { key: 'number', dir: 'asc' };

  function trendBadge(trend, label) {
    if (trend === 'up') return `<span class="trend-badge trend-up">&#x25B2; ${label}</span>`;
    if (trend === 'down') return `<span class="trend-badge trend-down">&#x25BC; ${label}</span>`;
    return `<span class="trend-badge trend-unknown">&#x3F; brak</span>`;
  }

  function fmtChange(pct, abs) {
    if (pct == null) return '<span class="unknown">—</span>';
    const cls = pct >= 0 ? 'up' : 'down';
    const sign = pct >= 0 ? '+' : '';
    return `<span class="${cls}">${sign}${pct.toFixed(2)}%<br><small>${sign}${abs.toFixed(2)}</small></span>`;
  }

  function fmtPrice(p) {
    if (p == null) return '<span class="unknown">—</span>';
    return `<span class="td-price">${p.toLocaleString('pl-PL', {minimumFractionDigits: 2, maximumFractionDigits: 2})}</span>`;
  }

  function parseWeight(w) {
    if (!w) return 0;
    return parseFloat(String(w).replace('%','').replace(',','.')) || 0;
  }

  function renderTable() {
    const search = document.getElementById('search').value.toLowerCase();
    const tbody = document.getElementById('table-body');

    let rows = [...allData];

    // Filtrowanie
    if (currentFilter === 'up') rows = rows.filter(r => r.daily_trend === 'up');
    else if (currentFilter === 'down') rows = rows.filter(r => r.daily_trend === 'down');
    else if (currentFilter === 'ma5up') rows = rows.filter(r => r.ma5_trend === 'up');
    else if (currentFilter === 'ma5down') rows = rows.filter(r => r.ma5_trend === 'down');

    // Wyszukiwanie
    if (search) {
      rows = rows.filter(r =>
        r.name.toLowerCase().includes(search) ||
        r.ticker.toLowerCase().includes(search)
      );
    }

    // Sortowanie
    const { key, dir } = currentSort;
    rows.sort((a, b) => {
      let va = a[key], vb = b[key];
      if (key === 'weight') { va = parseWeight(va); vb = parseWeight(vb); }
      if (key === 'daily_trend' || key === 'ma5_trend') {
        va = va === 'up' ? 1 : va === 'down' ? -1 : 0;
        vb = vb === 'up' ? 1 : vb === 'down' ? -1 : 0;
      }
      if (va == null) return 1;
      if (vb == null) return -1;
      if (typeof va === 'string') return dir === 'asc' ? va.localeCompare(vb) : vb.localeCompare(va);
      return dir === 'asc' ? va - vb : vb - va;
    });

    document.getElementById('count-info').textContent = `${rows.length} / ${allData.length} spółek`;

    if (rows.length === 0) {
      tbody.innerHTML = '<tr class="empty-row"><td colspan="9">Brak wyników</td></tr>';
      return;
    }

    tbody.innerHTML = rows.map(r => {
      const ma5text = r.ma5 != null ? r.ma5.toLocaleString('pl-PL', {minimumFractionDigits: 2}) : '—';
      return `
        <tr onclick="openChart('${r.yf_ticker}','${r.name.replace(/'/g,"\\'")}','${r.ticker}', ${r.price}, ${r.daily_change_pct})">
          <td class="td-ticker" style="color:var(--muted)">${r.number}</td>
          <td class="td-name">${r.name}</td>
          <td class="td-ticker">${r.ticker}${r.error ? ' <span title="'+r.error+'" style="color:var(--red);cursor:help">!</span>' : ''}</td>
          <td>${fmtPrice(r.price)}</td>
          <td class="td-change">${fmtChange(r.daily_change_pct, r.daily_change)}</td>
          <td>${trendBadge(r.daily_trend, r.daily_trend === 'up' ? 'Wzrost' : 'Spadek')}</td>
          <td style="color:var(--muted);font-variant-numeric:tabular-nums">${ma5text}</td>
          <td>${trendBadge(r.ma5_trend, r.ma5_trend === 'up' ? 'Rosnący' : 'Spadkowy')}</td>
          <td class="weight">${r.weight || '—'}</td>
        </tr>`;
    }).join('');
  }

  function setFilter(f) {
    currentFilter = f;
    document.querySelectorAll('.filter-btn').forEach(b => {
      b.classList.remove('active', 'active-up', 'active-down');
    });
    const btn = document.getElementById('filter-' + f);
    if (btn) {
      if (f === 'up' || f === 'ma5up') btn.classList.add('active-up');
      else if (f === 'down' || f === 'ma5down') btn.classList.add('active-down');
      else btn.classList.add('active');
    }
    renderTable();
  }

  function sortBy(key) {
    if (currentSort.key === key) {
      currentSort.dir = currentSort.dir === 'asc' ? 'desc' : 'asc';
    } else {
      currentSort = { key, dir: key === 'number' ? 'asc' : 'desc' };
    }
    document.querySelectorAll('thead th').forEach(th => {
      th.classList.remove('sort-asc', 'sort-desc');
    });
    const allThs = document.querySelectorAll('thead th');
    const keyMap = ['number','name','ticker','price','daily_change_pct','daily_trend','ma5','ma5_trend','weight'];
    const idx = keyMap.indexOf(key);
    if (idx >= 0 && allThs[idx]) {
      allThs[idx].classList.add(currentSort.dir === 'asc' ? 'sort-asc' : 'sort-desc');
    }
    renderTable();
  }

  async function loadData(forceRefresh = false) {
    const overlay = document.getElementById('overlay');
    const btn = document.getElementById('refresh-btn');
    const errBar = document.getElementById('error-bar');

    overlay.classList.remove('hidden');
    btn.disabled = true;
    errBar.style.display = 'none';

    try {
      if (forceRefresh) {
        await fetch('/api/refresh');
      }
      const resp = await fetch('/api/data');
      if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
      const json = await resp.json();

      if (json.error) throw new Error(json.error);

      allData = json.data;

      // Statystyki
      document.getElementById('stat-up').innerHTML = `&#x25B2; ${json.summary.up}`;
      document.getElementById('stat-down').innerHTML = `&#x25BC; ${json.summary.down}`;
      document.getElementById('stat-unk').innerHTML = `&#x3F; ${json.summary.unknown}`;
      document.getElementById('update-time').textContent = `Aktualizacja: ${json.updated_at}`;
      const src = json.holdings_source || '';
      const srcBadge = document.getElementById('source-badge');
      if (src === 'live') {
        srcBadge.innerHTML = '<span style="background:#d6f0e2;color:#2e9e5b;padding:0.2rem 0.6rem;border-radius:999px;font-size:0.72rem;font-weight:700;">&#x25CF; Live VanEck</span>';
      } else {
        srcBadge.innerHTML = `<span style="background:#fef3cd;color:#b7791f;padding:0.2rem 0.6rem;border-radius:999px;font-size:0.72rem;font-weight:700;" title="${src}">&#x25CF; Plik lokalny</span>`;
      }

      setFilter('all');
    } catch (e) {
      errBar.textContent = 'Błąd pobierania danych: ' + e.message;
      errBar.style.display = 'block';
    } finally {
      overlay.classList.add('hidden');
      btn.disabled = false;
    }
  }

  function forceRefresh() {
    loadData(true);
  }

  document.getElementById('search').addEventListener('input', renderTable);

  // Inicjalizacja
  setFilter('all');
  loadData();

  // ---- Wykres ----
  let chartInstance = null;
  let chartAllDates = [];
  let chartAllPrices = [];
  let chartAllMa5 = [];
  let chartAllMa20 = [];
  let activePeriod = 90;

  function openChart(yfticker, name, ticker, price, changePct) {
    document.getElementById('chart-name').textContent = name;
    document.getElementById('chart-ticker-label').textContent = ticker + ' · ' + yfticker;
    document.getElementById('chart-price').textContent = price != null ? price.toLocaleString('pl-PL', {minimumFractionDigits:2}) : '—';
    const changeEl = document.getElementById('chart-change');
    if (changePct != null) {
      const sign = changePct >= 0 ? '+' : '';
      changeEl.textContent = sign + changePct.toFixed(2) + '% dzisiaj';
      changeEl.style.color = changePct >= 0 ? 'var(--green)' : 'var(--red)';
    } else {
      changeEl.textContent = '';
    }

    document.getElementById('chart-modal').classList.remove('hidden');
    document.getElementById('chart-loading').style.display = 'block';
    document.getElementById('chart-error').style.display = 'none';
    document.getElementById('chart-canvas-wrap').style.display = 'none';
    if (chartInstance) { chartInstance.destroy(); chartInstance = null; }

    fetch('/api/chart/' + encodeURIComponent(yfticker))
      .then(r => r.json())
      .then(data => {
        if (data.error) throw new Error(data.error);
        chartAllDates  = data.dates;
        chartAllPrices = data.prices;
        chartAllMa5    = data.ma5;
        chartAllMa20   = data.ma20;
        renderChart(activePeriod);
      })
      .catch(e => {
        document.getElementById('chart-loading').style.display = 'none';
        const errEl = document.getElementById('chart-error');
        errEl.textContent = 'Błąd: ' + e.message;
        errEl.style.display = 'block';
      });
  }

  function renderChart(days) {
    activePeriod = days;
    document.querySelectorAll('.period-btn').forEach(b => b.classList.remove('active'));
    const periodMap = {30: 0, 90: 1, 180: 2};
    document.querySelectorAll('.period-btn')[periodMap[days] ?? 1].classList.add('active');

    const slice = -days;
    const dates  = chartAllDates.slice(slice);
    const prices = chartAllPrices.slice(slice);
    const ma5    = chartAllMa5.slice(slice);
    const ma20   = chartAllMa20.slice(slice);

    document.getElementById('chart-loading').style.display = 'none';
    document.getElementById('chart-canvas-wrap').style.display = 'block';

    if (chartInstance) { chartInstance.destroy(); }

    const ctx = document.getElementById('price-chart').getContext('2d');
    chartInstance = new Chart(ctx, {
      type: 'line',
      data: {
        labels: dates,
        datasets: [
          {
            label: 'Cena',
            data: prices,
            borderColor: '#4a7fc1',
            backgroundColor: 'rgba(74,127,193,0.08)',
            borderWidth: 2,
            pointRadius: 0,
            fill: true,
            tension: 0.3,
            order: 3,
          },
          {
            label: 'MA5',
            data: ma5,
            borderColor: '#e07b39',
            borderWidth: 1.5,
            pointRadius: 0,
            fill: false,
            tension: 0.3,
            borderDash: [],
            order: 2,
          },
          {
            label: 'MA20',
            data: ma20,
            borderColor: '#9b59b6',
            borderWidth: 1.5,
            pointRadius: 0,
            fill: false,
            tension: 0.3,
            borderDash: [5, 3],
            order: 1,
          },
        ],
      },
      options: {
        responsive: true,
        maintainAspectRatio: false,
        interaction: { mode: 'index', intersect: false },
        plugins: {
          legend: { display: false },
          tooltip: {
            backgroundColor: '#fff',
            titleColor: '#1a2e45',
            bodyColor: '#4a5568',
            borderColor: '#d1dce8',
            borderWidth: 1,
            padding: 10,
            callbacks: {
              label: ctx => ` ${ctx.dataset.label}: ${ctx.parsed.y != null ? ctx.parsed.y.toFixed(2) : '—'}`,
            }
          },
        },
        scales: {
          x: {
            grid: { color: '#edf2f8' },
            ticks: {
              color: '#7a8fa6',
              maxTicksLimit: 8,
              font: { size: 11 },
            },
          },
          y: {
            position: 'right',
            grid: { color: '#edf2f8' },
            ticks: {
              color: '#7a8fa6',
              font: { size: 11 },
            },
          },
        },
      },
    });
  }

  function setPeriod(days) {
    if (chartAllDates.length) renderChart(days);
  }

  function closeChart() {
    document.getElementById('chart-modal').classList.add('hidden');
    if (chartInstance) { chartInstance.destroy(); chartInstance = null; }
  }

  function closeChartOnBackdrop(e) {
    if (e.target === document.getElementById('chart-modal')) closeChart();
  }

  document.addEventListener('keydown', e => { if (e.key === 'Escape') closeChart(); });
</script>
</body>
</html>
